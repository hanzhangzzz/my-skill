<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Two skills in this repository</title>
  <desc id="desc">A visual map comparing GPT Image2 Prompt Director and Harness.</desc>
  <rect width="1200" height="420" rx="28" fill="#EEF3F7"/>
  <rect x="42" y="42" width="1116" height="336" rx="24" fill="#FFFFFF" stroke="#18212A" stroke-width="2"/>
  <text x="76" y="98" fill="#18212A" font-family="Arial, PingFang SC, sans-serif" font-size="32" font-weight="700">My Skill Market</text>
  <text x="76" y="132" fill="#56616C" font-family="Arial, PingFang SC, sans-serif" font-size="17">当前收录两个可复制安装的 Agent Skill：一个负责图像 prompt 质量，一个负责代码改进循环。</text>

  <g transform="translate(78 174)">
    <rect width="498" height="150" rx="18" fill="#FFF6DF" stroke="#18212A" stroke-width="1.5"/>
    <circle cx="54" cy="54" r="28" fill="#F7C948" stroke="#18212A" stroke-width="1.5"/>
    <text x="96" y="50" fill="#18212A" font-family="Arial, PingFang SC, sans-serif" font-size="24" font-weight="700">gpt-image2-prompt-director</text>
    <text x="96" y="84" fill="#3B424A" font-family="Arial, PingFang SC, sans-serif" font-size="16">弱点子 -&gt; 创意总监 brief -&gt; 质量评测 -&gt; 可生图 prompt</text>
    <text x="96" y="118" fill="#6A5B32" font-family="Arial, PingFang SC, sans-serif" font-size="15">适合头像、表情包、信息图、平台封面、产品图</text>
  </g>

  <g transform="translate(624 174)">
    <rect width="498" height="150" rx="18" fill="#E7F4EC" stroke="#18212A" stroke-width="1.5"/>
    <circle cx="54" cy="54" r="28" fill="#55B47B" stroke="#18212A" stroke-width="1.5"/>
    <text x="96" y="50" fill="#18212A" font-family="Arial, PingFang SC, sans-serif" font-size="24" font-weight="700">harness</text>
    <text x="96" y="84" fill="#3B424A" font-family="Arial, PingFang SC, sans-serif" font-size="16">Inspector -&gt; Worker -&gt; Reviewer，通过 TODO.md 持续推进</text>
    <text x="96" y="118" fill="#315F43" font-family="Arial, PingFang SC, sans-serif" font-size="15">适合自动巡检、修复、复审和定时改进代码仓库</text>
  </g>
</svg>
